<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearwave Landing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7faf9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        .hero-section {
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #2d6a4f;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
        }

        .badge::before {
            content: '•';
            margin-right: 6px;
            font-size: 14px;
            vertical-align: middle;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: #111;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        h1 span {
            font-style: italic;
            font-weight: 700;
        }

        .description {
            font-size: 15px;
            color: #666;
            max-width: 540px;
            margin: 0 auto 60px auto;
            line-height: 1.6;
        }

        .mockup-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 12px;
            margin-top: 20px;
            padding: 0 20px;
        }

        .mockup-container img {
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            background-color: #ffffff;
            transition: transform 0.3s ease;
        }

        /* Exact widths to match the layout */
        .side-left-far {
            width: 120px;
            transform: translateY(50px) scale(0.8);
        }

        .side-left {
            width: 150px;
            transform: translateY(25px) scale(0.9);
        }

        .center-main {
            width: 190px;
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1) !important;
        }

        .side-right {
            width: 150px;
            transform: translateY(25px) scale(0.9);
        }

        .side-right-far {
            width: 120px;
            transform: translateY(50px) scale(0.8);
        }

        .mockup-container img:hover {
            transform: translateY(-5px) scale(1);
            z-index: 3;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .mockup-container {
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 15px;
                padding: 0 20px;
                justify-content: flex-start;
            }

            .mockup-container img {
                flex-shrink: 0;
                width: 160px !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <span class="badge">Mobile App</span>
        <h1>Your workspace,<br><span>in your pocket</span></h1>
        <p class="description">
            The Clearwave mobile app brings every dashboard, task, and notification to you — beautifully adapted for any screen.
        </p>
        
        <div class="mockup-container">
            <img src="images/tm-622-screen-02.jpg" alt="Far Left Panel" class="side-left-far">
            <img src="images/tm-622-screen-03.jpg" alt="Left App Screen" class="side-left">
            <img src="images/tm-622-screen-04.jpg" alt="Main Screen" class="center-main">
            <img src="images/tm-622-screen-05.jpg" alt="Right App Screen" class="side-right">
            <img src="images/tm-622-screen-01.jpg" alt="Far Right Panel" class="side-right-far">
        </div>
    </section>
    
</body>
</html>
